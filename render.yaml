services:
  - type: web
    name: financelend-identity-ai-imtiaz
    runtime: docker
    plan: free
    rootDir: ai-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: IDENTITY_AI_SERVICE_KEY
        sync: false
      - key: IDENTITY_ALLOWED_ASSET_HOSTS
        value: financelend-api-imtiaz.onrender.com
      - key: IDENTITY_LIVENESS_ENABLED
        value: "false"

  - type: web
    name: financelend-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_TIMEZONE
        value: Asia/Dhaka
      - key: USE_MEMORY_DB
        value: "false"
      - key: AUTO_SEED
        value: "false"
      - key: EXPOSE_EMAIL_OTP
        value: "false"
      - key: UPLOAD_DIR
        value: uploads
      - key: STRIPE_CURRENCY
        value: bdt
      - key: ALLOW_STRIPE_CURRENCY_CONVERSION
        value: "false"
      - key: ALLOW_STRIPE_RETURN_CONFIRM
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EMAIL_PROVIDER
        value: gmail_api
      - key: SMTP_USER
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PUBLIC_CLIENT_URL
        sync: false
      - key: IDENTITY_AI_URL
        sync: false
      - key: IDENTITY_PUBLIC_API_URL
        sync: false
      - key: IDENTITY_AI_SERVICE_KEY
        sync: false
      - key: IDENTITY_DATA_ENCRYPTION_KEY
        sync: false
      - key: IDENTITY_SESSION_TTL_MINUTES
        value: "10"
      - key: IDENTITY_ARTIFACT_RETENTION_HOURS
        value: "24"
      - key: IDENTITY_AI_TIMEOUT_MS
        value: "300000"
